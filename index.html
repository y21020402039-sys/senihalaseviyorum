<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seni hala seviyorum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background-color: #4b3d61; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'VT323', monospace; }
        #stardew-board { background-color: #eec39a; border: 6px solid #633324; padding: 30px; box-shadow: 8px 8px 0px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 85%; }
        h2 { color: #633324; font-size: 35px; margin-bottom: 25px; }
        .btn { background-color: #f7d6a5; border: 4px solid #633324; padding: 10px 25px; margin: 10px; font-size: 26px; color: #633324; cursor: pointer; font-family: 'VT323', monospace; width: 80%; }
        .btn:active { background-color: #ba916b; transform: translateY(2px); }
        #game { display: none; }
        .chars { display: flex; justify-content: space-around; margin: 20px 0; }
        .box { width: 130px; height: 160px; border: 4px solid #633324; background: #fffaf0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #633324; font-weight: bold; }
        #target-char { cursor: crosshair; background-color: #fffaf0; transition: background 0.3s; }
        #result { font-size: 25px; color: #b03a2e; height: 30px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="stardew-board">
    <div id="step1">
        <h2>nasılsın? :)</h2>
        <button class="btn" onclick="toStep2()">iyiyim</button>
        <button class="btn" onclick="toStep2()">iyi değilim</button>
    </div>

    <div id="step2" style="display:none;">
        <h2>oyun oynayalım mı?</h2>
        <button class="btn" onclick="toGame()">evet</button>
        <button class="btn" onclick="toGame()">evet</button>
    </div>

    <div id="game">
        <h2 id="game-title">seçtiğim yeri öpme :)</h2>
        <div class="chars">
            <div class="box">O</div>
            <div class="box" id="target-char" onclick="check(event)">sen</div>
        </div>
        <div id="result"></div>
    </div>
</div>

<script>
    // Sayfalar arası geçiş fonksiyonları (Kesin tetiklenir)
    function toStep2() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function toGame() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('game').style.display = 'block';
    }

    // Mayın mantığı
    const goalX = Math.floor(Math.random() * 70) + 15;
    const goalY = Math.floor(Math.random() * 70) + 15;
    let isDone = false;

    function check(e) {
        if(isDone) return;
        const r = e.target.getBoundingClientRect();
        const px = ((e.clientX - r.left) / r.width) * 100;
        const py = ((e.clientY - r.top) / r.height) * 100;

        const d = Math.sqrt(Math.pow(px - goalX, 2) + Math.pow(py - goalY, 2));

        if (d < 20) {
            document.getElementById('result').innerHTML = "yandın";
            document.getElementById('target-char').style.background = "#e74c3c";
            document.getElementById('game-title').innerText = "Yandın kanka!";
            isDone = true;
        } else {
            document.getElementById('result').innerText = "safe";
        }
    }
</script>

</body>
</html>
