<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Love Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background-color: #211510; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace;
            image-rendering: pixelated;
        }

        /* Stardew Valley Panel Yapısı */
        .game-container {
            background: #eec39a;
            border: 4px solid #3d1f14;
            outline: 6px solid #ba916b;
            width: 90%;
            max-width: 450px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* Üst Diyalog Kutusu */
        .dialog-box {
            background-color: #fffaf0;
            border: 4px solid #633324;
            padding: 12px;
            color: #633324;
            font-size: 26px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* Sahne - Karakterlerin Yakın Çekim Durduğu Yer */
        .action-scene {
            background: #ba916b;
            border: 4px solid #3d1f14;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        /* Karakterler */
        .character {
            width: 170px;
            height: 240px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #girl-char {
            position: absolute;
            left: -20px;
            z-index: 10;
        }

        .status-bar {
            color: #ffeb3b;
            font-size: 22px;
            text-align: center;
            margin-top: 10px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="dialog-box" id="msg">seçtiğim yeri öpme :) ❤️</div>
    
    <div class="action-scene">
        <div id="girl-char" class="character">
            <svg viewBox="0 0 40 60" width="100%" height="100%">
                <rect x="5" y="5" width="30" height="40" fill="#4d2e24"/> <rect x="8" y="10" width="24" height="30" fill="#fbc3a5"/> <rect x="11" y="22" width="4" height="3" fill="#3a5f32"/> <rect x="25" y="22" width="4" height="3" fill="#3a5f32"/> <rect x="16" y="34" width="8" height="2" fill="#d16b66"/> <rect x="5" y="45" width="30" height="15" fill="#505e35"/> </svg>
        </div>

        <div id="boy-char" class="character" onclick="kissAction(event)">
            <svg viewBox="0 0 40 60" width="100%" height="100%">
                <path d="M5 5h30v30H5z" fill="#1a1a1a"/> <rect x="8" y="12" width="24" height="28" fill="#fbc3a5"/> <rect x="10" y="20" width="7" height="2" fill="#000000"/> <rect x="23" y="20" width="7" height="2" fill="#000000"/> <rect x="11" y="24" width="4" height="3" fill="#3a5f32"/> <rect x="25" y="24" width="4" height="3" fill="#3a5f32"/> <rect x="5" y="45" width="30" height="15" fill="#1a1a1a"/> </svg>
        </div>
    </div>
</div>

<div class="status-bar" id="log">safe</div>

<script>
    const girl = document.getElementById('girl-char');
    const msg = document.getElementById('msg');
    const log = document.getElementById('log');

    // Gizli Mayın Noktası
    let mineX = 50, mineY = 30;

    function kissAction(e) {
        const rect = document.getElementById('boy-char').getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Kızın hamlesi (Canlı animasyon)
        girl.style.transform = `translate(${e.clientX - 140}px, ${e.clientY - 420}px) scale(1.1)`;
        
        setTimeout(() => {
            girl.style.transform = `translate(0,0) scale(1)`;
            
            const dist = Math.sqrt(Math.pow(x - mineX, 2) + Math.pow(y - mineY, 2));

            if(dist < 15) {
                msg.innerText = "EYVAH! 🔥 Yandık...";
                log.innerText = "Yasak yer değişti!";
                mineX = Math.random() * 60 + 20;
                mineY = Math.random() * 40 + 20;
            } else {
                msg.innerText = "Mmm... Devam et ❤️";
                log.innerText = "safe";
            }
        }, 250);
    }
</script>
</body>
</html>
