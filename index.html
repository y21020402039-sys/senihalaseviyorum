<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Hala Seviyorum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background-color: #211510; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        /* Birebir Stardew Paneli (3. görseldeki gibi) */
        .stardew-frame {
            background-color: #eec39a;
            border: 4px solid #3d1f14;
            outline: 6px solid #ba916b;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Diyalog Kutusu */
        .message-box {
            background-color: #fffaf0;
            border: 4px solid #633324;
            padding: 15px;
            color: #633324;
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* Oyun Sahnesi - Karakterlerin Yanyana Durduğu Yer */
        .scene {
            background-color: #ba916b;
            border: 4px solid #3d1f14;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* Karakterler (Görsel olarak yüklenecek) */
        .char-img {
            width: 200px;
            height: 250px;
            position: relative;
            cursor: pointer;
            transition: transform 0.15s ease-out;
            object-fit: contain;
        }

        /* Kız Karakter (Senin attığın görseldeki gibi) */
        #girl-port {
            position: absolute;
            left: -10px;
            z-index: 5;
            /* Buraya kızın portresini çiziyoruz */
        }

        /* Senin Karakterin (Kıvırcık siyah saçlı halin) */
        #boy-port {
            z-index: 10;
        }

        .log-text {
            color: #ffeb3b;
            font-size: 24px;
            text-align: center;
            margin-top: 15px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div class="stardew-frame">
    <div class="message-box" id="msg">Mmm... Devam et ❤️</div>
    
    <div class="scene">
        <img id="girl-port" class="char-img" src="https://raw.githubusercontent.com/0402039-sys/senihalaseviyorum/main/her.png" alt="Her">
        
        <img id="boy-port" class="char-img" src="https://raw.githubusercontent.com/0402039-sys/senihalaseviyorum/main/me.png" onclick="playKiss(event)" alt="Me">
    </div>
</div>

<div class="log-text" id="status">safe</div>

<script>
    const girl = document.getElementById('girl-port');
    const msg = document.getElementById('msg');
    const status = document.getElementById('status');

    // Gizli Mayın Koordinatları
    let mineX = 50, mineY = 40;

    function playKiss(e) {
        const rect = document.getElementById('boy-port').getBoundingClientRect();
        const px = ((e.clientX - rect.left) / rect.width) * 100;
        const py = ((e.clientY - rect.top) / rect.height) * 100;

        // Kızın sana doğru hamlesi (Canlı animasyon)
        girl.style.transform = `translate(${e.clientX - 180}px, ${e.clientY - 480}px) rotate(8deg) scale(1.1)`;
        
        setTimeout(() => {
            girl.style.transform = `translate(0,0) rotate(0deg) scale(1)`;
            
            const dist = Math.sqrt(Math.pow(px - mineX, 2) + Math.pow(py - mineY, 2));

            if(dist < 15) {
                msg.innerText = "EYVAH! 🔥 Yandık...";
                status.innerText = "Yasak yer değişti!";
                mineX = Math.random() * 60 + 20;
                mineY = Math.random() * 40 + 20;
            } else {
                msg.innerText = "Mmm... Devam et ❤️";
                status.innerText = "safe";
            }
        }, 200);
    }
</script>
</body>
</html>
