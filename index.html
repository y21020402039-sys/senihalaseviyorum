<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Hala Seviyorum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background-color: #211510; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace;
            image-rendering: pixelated;
        }

        /* Stardew Valley Panel Yapısı */
        .game-container {
            background: #eec39a;
            border: 4px solid #3d1f14;
            outline: 6px solid #ba916b;
            width: 90%;
            max-width: 450px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* Üst Diyalog Kutusu */
        .dialog-box {
            background-color: #fffaf0;
            border: 4px solid #633324;
            padding: 12px;
            color: #633324;
            font-size: 26px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* Sahne - Karakterlerin Yakın Çekim Durduğu Yer */
        .action-scene {
            background: #ba916b;
            border: 4px solid #3d1f14;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        /* Karakter Çizimleri (Büyük ve Yakın) */
        .character {
            width: 170px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* KIZ (Bensiz, Stardew Tarzı Gölgeli) */
        #girl-char {
            background-image: url('https://raw.githubusercontent.com/0402039-sys/senihalaseviyorum/main/her.png');
            position: absolute;
            left: -20px;
            z-index: 10;
        }

        /* SEN (Siyah Kaş/Saç, Tıklanan taraf) */
        #boy-char {
            background-image: url('https://raw.githubusercontent.com/0402039-sys/senihalaseviyorum/main/me.png');
        }

        .status-bar {
            color: #ffeb3b;
            font-size: 22px;
            text-align: center;
            margin-top: 10px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="dialog-box" id="msg">seçtiğim yeri öpme :) ❤️</div>
    
    <div class="action-scene">
        <div id="girl-char" class="character"></div>
        <div id="boy-char" class="character" onclick="kissAction(event)"></div>
    </div>
</div>

<div class="status-bar" id="log">safe</div>

<script>
    const girl = document.getElementById('girl-char');
    const msg = document.getElementById('msg');
    const log = document.getElementById('log');

    // Gizli Mayın Noktası
    let mineX = 50, mineY = 30;

    function kissAction(e) {
        const rect = document.getElementById('boy-char').getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Kızın hamlesi (Canlı animasyon)
        girl.style.transform = `translate(${e.clientX - 140}px, ${e.clientY - 420}px) scale(1.1)`;
        
        setTimeout(() => {
            girl.style.transform = `translate(0,0) scale(1)`;
            
            const dist = Math.sqrt(Math.pow(x - mineX, 2) + Math.pow(y - mineY, 2));

            if(dist < 15) {
                msg.innerText = "EYVAH! 🔥 Yandık...";
                log.innerText = "Yasak yer değişti!";
                mineX = Math.random() * 60 + 20;
                mineY = Math.random() * 40 + 20;
            } else {
                msg.innerText = "Mmm... Devam et ❤️";
                log.innerText = "safe";
            }
        }, 250);
    }
</script>
</body>
</html>
