<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Hala Seviyorum</title>
    <style>
        /* Stardew Valley fontu için pixel tarzı font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body { 
            background-color: #4b3d61; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace; 
            overflow: hidden;
        }

        /* Stardew Menü Paneli */
        #game-container {
            background-color: #eec39a; 
            border: 6px solid #633324; 
            padding: 20px;
            box-shadow: inset -4px -4px 0px #ba916b, 8px 8px 0px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 450px;
            text-align: center;
            image-rendering: pixelated;
        }

        .title { color: #633324; font-size: 32px; margin-bottom: 15px; text-shadow: 2px 2px 0px #fff; }

        /* Karakter Portre Alanı */
        .portrait-frame {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .char-box {
            width: 140px;
            height: 140px;
            border: 4px solid #633324;
            background: #fffaf0;
            position: relative;
            cursor: crosshair;
            overflow: hidden;
        }

        /* Karakter Görselleri (Pixel art) */
        .char-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            image-rendering: pixelated;
        }

        /* Senin karakterin (Siyah saç/kaş) */
        #boy { background-image: url('https://files.oaiusercontent.com/file-D09D5O38m2iG9V8N8A7pP2?se=2024-05-08T15%3A20%3A00Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D604800%2C%20private%2C%20immutable&rscd=attachment%3B%20filename%3Dpixel_chars_updated.png'); background-position: left; }
        
        /* Kız karakter (Bensiz) */
        #girl { background-image: url('https://files.oaiusercontent.com/file-D09D5O38m2iG9V8N8A7pP2?se=2024-05-08T15%3A20%3A00Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D604800%2C%20private%2C%20immutable&rscd=attachment%3B%20filename%3Dpixel_chars_updated.png'); background-position: right; }

        #message { font-size: 24px; color: #633324; min-height: 30px; margin-top: 10px; }
        
        .reset-btn {
            background-color: #f7d6a5;
            border: 3px solid #633324;
            padding: 8px 15px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: #633324;
            margin-top: 15px;
            display: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="title">Beni Öp... (Ama Doğru Yerden!)</div>
    
    <div class="portrait-frame">
        <div class="char-box" title="O">
            <div id="girl" class="char-img"></div>
        </div>
        <div class="char-box" id="target-area" title="Sen">
            <div id="boy" class="char-img" onclick="playGame(event)"></div>
        </div>
    </div>

    <div id="message">Yüzümde rastgele bir yer seçtim. Oradan öpersen yanarız!</div>
    <button class="reset-btn" id="rb" onclick="resetGame()">Tekrar Dene</button>
</div>

<script>
    let trapX, trapY;
    let isGameOver = false;

    // Oyunu başlat/noktayı seç
    function initGame() {
        trapX = Math.floor(Math.random() * 80) + 10; // %10-90 arası rastgele X
        trapY = Math.floor(Math.random() * 80) + 10; // %10-90 arası rastgele Y
        isGameOver = false;
        document.getElementById('message').innerText = "Hadi, bir yerimden öp bakalım... ❤️";
        document.getElementById('rb').style.display = 'none';
        document.getElementById('target-area').style.backgroundColor = "#fffaf0";
    }

    function playGame(e) {
        if(isGameOver) return;

        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // "Mayın" noktasına olan uzaklığı hesapla
        const distance = Math.sqrt(Math.pow(x - trapX, 2) + Math.pow(y - trapY, 2));

        if (distance < 15) { // Eğer mayın bölgesine çok yakınsa (öperse)
            isGameOver = true;
            document.getElementById('message').innerText = "EYVAH! 🔥 Yanlış yer! Yandık...";
            document.getElementById('target-area').style.backgroundColor = "#ffb3b3";
            document.getElementById('rb').style.display = 'inline-block';
        } else {
            document.getElementById('message').innerText = "Güvendeyiz... Bir daha öp! ❤️";
        }
    }

    function resetGame() {
        initGame();
    }

    // İlk açılışta başlat
    initGame();
</script>

</body>
</html>
