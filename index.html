<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background-color: #2c1d1a; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'VT323', monospace; }
        #room { background-color: #633324; border: 8px solid #3d1f14; width: 90%; max-width: 450px; padding: 20px; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        .scene { background-color: #eec39a; border: 4px solid #ba916b; padding: 20px; display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-top: 15px; min-height: 180px; image-rendering: pixelated; }
        .char { width: 140px; height: 160px; background-size: contain; background-repeat: no-repeat; background-position: bottom; cursor: pointer; }
        /* Saç ve kaşlar siyah, kızda ben yok */
        #boy { background-image: url('https://files.oaiusercontent.com/file-D09D5O38m2iG9V8N8A7pP2?se=2024-05-08T15%3A20%3A00Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D604800%2C%20private%2C%20immutable&rscd=attachment%3B%20filename%3Dpixel_chars_updated.png'); background-position: left; }
        #girl { background-image: url('https://files.oaiusercontent.com/file-D09D5O38m2iG9V8N8A7pP2?se=2024-05-08T15%3A20%3A00Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D604800%2C%20private%2C%20immutable&rscd=attachment%3B%20filename%3Dpixel_chars_updated.png'); background-position: right; }
        .dialog { background-color: #fffaf0; border: 4px solid #633324; padding: 10px; font-size: 22px; color: #633324; }
    </style>
</head>
<body>
<div id="room">
    <div class="dialog" id="msg">Yüzümde bir yer seçtim, öp bakalım... ❤️</div>
    <div class="scene">
        <div id="girl" class="char"></div>
        <div id="boy" class="char" onclick="check(event)"></div>
    </div>
</div>
<script>
    let tx = Math.floor(Math.random() * 60) + 20;
    let ty = Math.floor(Math.random() * 60) + 20;
    function check(e) {
        const r = e.target.getBoundingClientRect();
        const x = ((e.clientX - r.left) / r.width) * 100;
        const y = ((e.clientY - r.top) / r.height) * 100;
        if(Math.sqrt(Math.pow(x-tx,2)+Math.pow(y-ty,2)) < 15) {
            document.getElementById('msg').innerText = "EYVAH! 🔥 Yanlış yer, yandık!";
            tx = Math.floor(Math.random() * 60) + 20; ty = Math.floor(Math.random() * 60) + 20;
        } else { document.getElementById('msg').innerText = "Safe... Devam et ❤️"; }
    }
</script>
</body>
</html>
