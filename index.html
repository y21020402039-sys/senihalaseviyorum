<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Kissing Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background-color: #211510; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace;
            image-rendering: pixelated;
        }

        /* Stardew Valley Diyalog Paneli */
        .stardew-frame {
            background: #eec39a;
            border: 4px solid #3d1f14;
            outline: 6px solid #ba916b;
            padding: 10px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 0 4px #3d1f14, 0 10px 30px rgba(0,0,0,0.7);
        }

        /* Üst Mesaj Kutusu */
        .message-box {
            background-color: #fffaf0;
            border: 4px solid #633324;
            padding: 10px;
            color: #633324;
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
            box-shadow: inset 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* Canlı Oyun Sahnesi */
        .scene {
            background: #ba916b;
            border: 4px solid #3d1f14;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        /* Karakterler - Yakın Çekim */
        .character {
            width: 180px;
            height: 250px;
            position: relative;
            cursor: crosshair;
        }

        #girl-char {
            position: absolute;
            left: -30px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .status {
            color: #ffeb3b;
            font-size: 24px;
            text-align: center;
            margin-top: 15px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div class="stardew-frame">
    <div class="message-box" id="msg">Mmm... Devam et ❤️</div>
    
    <div class="scene">
        <div id="girl-char" class="character">
            <svg viewBox="0 0 40 60" width="100%" height="100%">
                <rect x="5" y="5" width="30" height="38" fill="#5c4033"/> <rect x="8" y="10" width="24" height="28" fill="#fbc3a5"/> <rect x="10" y="20" width="4" height="4" fill="#2d5a27"/> <rect x="26" y="20" width="4" height="4" fill="#2d5a27"/> <rect x="16" y="32" width="8" height="2" fill="#e17b77"/> <rect x="4" y="45" width="32" height="15" fill="#4a5d23"/> </svg>
        </div>

        <div id="boy-char" class="character" onclick="handleKiss(event)">
            <svg viewBox="0 0 40 60" width="100%" height="100%">
                <rect x="5" y="5" width="30" height="32" fill="#4b3621"/> <rect x="8" y="12" width="24" height="28" fill="#fbc3a5"/> <rect x="11" y="18" width="6" height="2" fill="#4b3621"/> <rect x="23" y="18" width="6" height="2" fill="#4b3621"/> <rect x="12" y="22" width="4" height="4" fill="#2d5a27"/> <rect x="24" y="22" width="4" height="4" fill="#2d5a27"/> <rect x="4" y="45" width="32" height="15" fill="#1a1a1a"/> </svg>
        </div>
    </div>
</div>

<div class="status" id="st">safe</div>

<script>
    const girl = document.getElementById('girl-char');
    const msg = document.getElementById('msg');
    const st = document.getElementById('st');

    // Gizli Mayın Noktası
    let mineX = 50, mineY = 30;

    function handleKiss(e) {
        const rect = document.getElementById('boy-char').getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Kızın hamlesi
        girl.style.transform = `translate(${e.clientX - 150}px, ${e.clientY - 450}px) rotate(10deg)`;
        
        setTimeout(() => {
            girl.style.transform = `translate(0,0) rotate(0deg)`;
            
            const dist = Math.sqrt(Math.pow(x - mineX, 2) + Math.pow(y - mineY, 2));

            if(dist < 15) {
                msg.innerText = "EYVAH! 🔥 Yandık...";
                st.innerText = "Yasak yer değişti!";
                mineX = Math.random() * 60 + 20;
                mineY = Math.random() * 40 + 20;
            } else {
                msg.innerText = "Mmm... Devam et ❤️";
                st.innerText = "safe";
            }
        }, 250);
    }
</script>
</body>
</html>
