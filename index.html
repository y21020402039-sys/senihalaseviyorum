<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Hala Seviyorum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background-color: #4b3d61; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'VT323', monospace; image-rendering: pixelated; }
        #room { background-color: #633324; border: 8px solid #3d1f14; width: 90%; max-width: 450px; padding: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .dialog { background-color: #fffaf0; border: 4px solid #633324; padding: 15px; font-size: 26px; color: #633324; margin-bottom: 15px; min-height: 30px; }
        .scene { background-color: #eec39a; border: 4px solid #ba916b; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 250px; }
        
        /* Karakterleri SVG ile pikselli çizdik (Link derdi yok) */
        .pixel-art { width: 150px; height: 180px; cursor: pointer; }
        #boy { filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>
<div id="room">
    <div class="dialog" id="msg">seçtiğim yeri öpme :)</div>
    <div class="scene">
        <svg class="pixel-art" viewBox="0 0 40 60">
            <rect x="8" y="5" width="24" height="25" fill="#5c4033"/> <rect x="10" y="10" width="20" height="20" fill="#fbc3a5"/> <rect x="13" y="18" width="3" height="3" fill="#2d5a27"/> <rect x="24" y="18" width="3" height="3" fill="#2d5a27"/> <rect x="10" y="30" width="20" height="25" fill="#4a5d23"/> </svg>

        <svg class="pixel-art" id="boy" viewBox="0 0 40 60" onclick="check(event)">
            <rect x="8" y="5" width="24" height="25" fill="#000000"/> <rect x="10" y="10" width="20" height="20" fill="#fbc3a5"/> <rect x="12" y="15" width="5" height="2" fill="#000000"/> <rect x="23" y="15" width="5" height="2" fill="#000000"/> <rect x="13" y="19" width="3" height="3" fill="#2d5a27"/> <rect x="24" y="19" width="3" height="3" fill="#2d5a27"/> <rect x="10" y="30" width="20" height="25" fill="#1a1a1a"/> </svg>
    </div>
    <div id="safe-msg" style="color:#b03a2e; margin-top:10px; font-size:20px;">safe</div>
</div>

<script>
    // Rastgele bir yasak bölge seç
    let tx = Math.floor(Math.random() * 60) + 20;
    let ty = Math.floor(Math.random() * 40) + 10;

    function check(e) {
        const r = document.getElementById('boy').getBoundingClientRect();
        const x = ((e.clientX - r.left) / r.width) * 100;
        const y = ((e.clientY - r.top) / r.height) * 100;
        const dist = Math.sqrt(Math.pow(x-tx, 2) + Math.pow(y-ty, 2));

        if(dist < 18) {
            document.getElementById('msg').innerText = "EYVAH! 🔥 Yandık!";
            document.getElementById('safe-msg').innerText = "Yasak yer değişti!";
            tx = Math.floor(Math.random() * 60) + 20;
            ty = Math.floor(Math.random() * 40) + 10;
        } else {
            document.getElementById('msg').innerText = "Mmm... Devam et ❤️";
            document.getElementById('safe-msg').innerText = "safe";
        }
    }
</script>
</body>
</html>
