<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Hala Seviyorum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background-color: #4b3d61; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace; 
            overflow: hidden;
            image-rendering: pixelated; /* Pikselleri netleştirir */
        }

        #room-frame {
            background-color: #633324;
            border: 6px solid #3d1f14;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        /* Karakterlerin yan yana durduğu oda içi */
        .seating-area {
            background-color: #eec39a;
            border: 4px solid #ba916b;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin-top: 15px;
            min-height: 200px;
            position: relative;
        }

        .char-portrait {
            width: 140px;
            height: 170px;
            border: 4px solid #633324;
            background: #fffaf0;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }

function load_profile() {
    let req = new XMLHttpRequest();
    req.open('POST', '/api/v1/users/view', true);
    req.setRequestHeader('Content-Type', 'application/json');
    req.withCredentials = true;
    req.onload = function () {
        if (req.status != 200) {
            handle_error();
        }
        fill_profile_logged_user(JSON.parse(req.responseText));
    };
    req.onerror = function () {
        handle_error();
    };
    req.send();
}

function handle_error() {
    console.log('not logged in');
    document.getElementById('profile_tab').style.display = 'none';
    document.getElementById('landing_tab').style.display = 'block';
    window.location.hash = '#';
}

function load_profile_other_user() {
    let location_hash = window.location.hash;
    if (!location_hash) {
        // handle_error();
    }
    let username = location_hash.split('#profile=')[1];
    let req = new XMLHttpRequest();
    req.open('POST', '/api/v1/users/view/' + encodeURIComponent(username), true);
    req.setRequestHeader('Content-Type', 'application/json');
    req.withCredentials = true;
    req.onload = function () {
        if (req.status != 200) {
            // handle_error();
        }
        fill_profile_other_user(JSON.parse(req.responseText));
    };
    req.onerror = function () {
        // handle_error();
    };
    req.send();
}

function init_profile() {
    let location_hash = window.location.hash;
    if (location_hash.includes('profile=')) {
        if (document.getElementById('landing_tab')) {
            document.getElementById('landing_tab').style.display = 'none';
        }
        document.getElementById('profile_tab_other_user').style.display = 'block';
        load_profile_other_user();
    } else {
        document.getElementById('profile_tab').style.display = 'block';
        load_profile();
    }
}
